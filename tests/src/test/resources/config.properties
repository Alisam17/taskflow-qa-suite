# ─── Application ───────────────────────────────────────────────────────────
app.base.url=http://localhost:8080

# ─── Browser ────────────────────────────────────────────────────────────────
# Options: chrome, firefox
browser=chrome
browser.headless=true
browser.implicit.wait=10
browser.explicit.wait=15

# ─── Selenium Grid (Docker) ──────────────────────────────────────────────────
# Set selenium.remote=true when running against Docker Selenium Grid
selenium.remote=false
selenium.grid.url=http://localhost:4444

# ─── Test data ──────────────────────────────────────────────────────────────
test.data.cleanup=true
