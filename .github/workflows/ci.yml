name: TaskFlow QA CI Pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:   # Allow manual runs from GitHub Actions UI
    inputs:
      test_group:
        description: 'Test group to run (api / ui / all)'
        required: false
        default: 'all'

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # Job 1: Build the application
  # ══════════════════════════════════════════════════════════════════════
  build-app:
    name: Build Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Build application JAR
        run: mvn -f app/pom.xml package -DskipTests -q

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/*.jar
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════
  # Job 2: API Tests (runs against live Spring Boot + WireMock)
  # ══════════════════════════════════════════════════════════════════════
  api-tests:
    name: API Tests (REST Assured + WireMock)
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/

      - name: Start TaskFlow application
        run: |
          java -jar app/target/*.jar &
          echo "APP_PID=$!" >> $GITHUB_ENV
          echo "Waiting for app to start..."

      - name: Wait for application health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ App is healthy"
              break
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 3
          done

      - name: Run API tests
        run: |
          cd tests
          mvn test -Dgroups=api -Dapp.base.url=http://localhost:8080 \
              -Dallure.results.directory=target/allure-results

      - name: Upload Allure results
        if: always()   # Upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: tests/target/allure-results
          retention-days: 14

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-api
          path: tests/target/surefire-reports
          retention-days: 14

  # ══════════════════════════════════════════════════════════════════════
  # Job 3: UI Tests (Selenium Grid via Docker)
  # ══════════════════════════════════════════════════════════════════════
  ui-tests:
    name: UI Tests (Selenium + Docker Grid)
    runs-on: ubuntu-latest
    needs: build-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Download application JAR
        uses: actions/download-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/

      - name: Start Selenium Grid (Docker Compose)
        run: |
          docker compose up -d selenium-hub chrome-node
          echo "Waiting for Selenium Grid..."
          sleep 10

      - name: Start TaskFlow application
        run: |
          java -jar app/target/*.jar &
          echo "Waiting for app..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/actuator/health && break || sleep 3
          done

      - name: Wait for Selenium Grid to be ready
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:4444/status | python3 -c "import sys,json; d=json.load(sys.stdin); print('ready' if d.get('value',{}).get('ready') else 'not_ready')" 2>/dev/null)
            if [ "$STATUS" = "ready" ]; then
              echo "✅ Selenium Grid is ready"
              break
            fi
            echo "Attempt $i/20 — Grid not ready yet..."
            sleep 5
          done

      - name: Run UI tests against Selenium Grid
        run: |
          cd tests
          mvn test -Dgroups=ui \
              -Dapp.base.url=http://localhost:8080 \
              -Dselenium.remote=true \
              -Dselenium.grid.url=http://localhost:4444 \
              -Dbrowser.headless=true \
              -Dallure.results.directory=target/allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: tests/target/allure-results
          retention-days: 14

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

  # ══════════════════════════════════════════════════════════════════════
  # Job 4: Generate Allure Report (after all tests)
  # ══════════════════════════════════════════════════════════════════════
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download API Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true

      - name: Download UI Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
        continue-on-error: true

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 30

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Upload combined Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/
          retention-days: 30
