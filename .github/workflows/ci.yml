name: TaskFlow QA CI Pipeline

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:

  build-app:
    name: Build Spring Boot App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Build JAR
        run: mvn -f app/pom.xml package -DskipTests -q
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/*.jar
          retention-days: 1

  api-tests:
    name: API Tests (REST Assured + WireMock)
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/
      - name: Start app and wait for health
        run: |
          java -jar app/target/*.jar &
          echo "Waiting for app..."
          for i in {1..20}; do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is up"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 3
          done
          echo "App never started" && exit 1
      - name: Run API and contract tests
        run: |
          cd tests
          mvn test \
            -Dtest="TaskCrudApiTest,TaskFilterApiTest,TaskSchemaValidationTest,WireMockContractTest" \
            -Dapp.base.url=http://localhost:8080
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-api
          path: tests/target/allure-results
          retention-days: 14
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-api
          path: tests/target/surefire-reports
          retention-days: 14

  ui-tests:
    name: UI Tests (Selenium + Docker Grid)
    runs-on: ubuntu-latest
    needs: build-app
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: taskflow-app-jar
          path: app/target/
      - name: Start Selenium Grid
        run: |
          docker compose up -d selenium-hub chrome-node
          echo "Waiting for Selenium Grid..."
          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:4444/status | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('value',{}).get('ready','false'))" 2>/dev/null)
            if [ "$STATUS" = "True" ]; then
              echo "Grid is ready"
              break
            fi
            echo "Attempt $i/20..."
            sleep 5
          done
      - name: Start app and wait for health
        run: |
          java -jar app/target/*.jar &
          for i in {1..20}; do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "App is up"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 3
          done
          echo "App never started" && exit 1
      - name: Run UI tests
        run: |
          cd tests
          mvn test \
            -Dtest="DashboardUiTest" \
            -Dapp.base.url=http://localhost:8080 \
            -Dselenium.remote=true \
            -Dselenium.grid.url=http://localhost:4444 \
            -Dbrowser.headless=true
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-ui
          path: tests/target/allure-results
          retention-days: 14
      - name: Stop Docker services
        if: always()
        run: docker compose down -v

  allure-report:
    name: Publish Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/
        continue-on-error: true
      - name: Download UI results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/
        continue-on-error: true
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 30
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-combined
          path: allure-report/
          retention-days: 30
