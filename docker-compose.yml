version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# TaskFlow QA Suite — Docker Compose
#
# Services:
#   taskflow-app     → Spring Boot REST API + UI (system under test)
#   selenium-hub     → Selenium Grid Hub
#   chrome-node      → Chrome node registered to Grid
#   firefox-node     → Firefox node registered to Grid (optional)
#
# Usage:
#   Start everything:  docker compose up -d
#   Run API tests:     docker compose run --rm test-runner mvn test -Dgroups=api
#   Run all tests:     docker compose run --rm test-runner mvn test
#   View Grid UI:      http://localhost:4444/ui
#   View app:          http://localhost:8080
#   Stop & cleanup:    docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  taskflow-net:
    driver: bridge

volumes:
  allure-results:

services:

  # ──────────────────────────────────────────────────
  # The application being tested
  # ──────────────────────────────────────────────────
  taskflow-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: taskflow-app
    ports:
      - "8080:8080"
    networks:
      - taskflow-net
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ──────────────────────────────────────────────────
  # Selenium Grid Hub
  # ──────────────────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    ports:
      - "4444:4444"   # Grid UI + WebDriver endpoint
      - "4442:4442"   # Event bus publish
      - "4443:4443"   # Event bus subscribe
    networks:
      - taskflow-net
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=2

  # ──────────────────────────────────────────────────
  # Chrome Node (registered to Hub)
  # ──────────────────────────────────────────────────
  chrome-node:
    image: selenium/node-chrome:4.18.1
    container_name: selenium-chrome
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    networks:
      - taskflow-net
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - START_XVFB=false
    volumes:
      - /dev/shm:/dev/shm

  # ──────────────────────────────────────────────────
  # Firefox Node (optional — comment out to save memory)
  # ──────────────────────────────────────────────────
  firefox-node:
    image: selenium/node-firefox:4.18.1
    container_name: selenium-firefox
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    networks:
      - taskflow-net
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
    volumes:
      - /dev/shm:/dev/shm

  # ──────────────────────────────────────────────────
  # Test Runner (runs tests against the other services)
  # ──────────────────────────────────────────────────
  test-runner:
    image: eclipse-temurin:17-jdk-alpine
    container_name: taskflow-tests
    depends_on:
      taskflow-app:
        condition: service_healthy
      selenium-hub:
        condition: service_started
      chrome-node:
        condition: service_started
    networks:
      - taskflow-net
    working_dir: /tests
    volumes:
      - ./tests:/tests
      - allure-results:/tests/target/allure-results
      - ~/.m2:/root/.m2   # Mount Maven cache for faster builds
    environment:
      - APP_BASE_URL=http://taskflow-app:8080
      - SELENIUM_REMOTE=true
      - SELENIUM_GRID_URL=http://selenium-hub:4444
      - BROWSER_HEADLESS=true
    command: ["./mvnw", "test"]
    profiles:
      - test  # Only starts with: docker compose --profile test up
